<!doctype html>
  <html lang="zh-Hant" id="htmlRoot">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>NeonFlux</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- App icons -->
    <link rel="icon" type="image/png" href="icon_white.png">
    <link rel="icon" type="image/png" href="icon_white.png" media="(prefers-color-scheme: dark)">
    <link rel="apple-touch-icon" href="icon_white.png">
    <script src="./i18n.js" defer></script>
    <script src="./icons.js" defer></script>
    <style>
      :root{
        --bg: #0b0f14;
        --glass: rgba(255,255,255,0.08);
        --glass-strong: rgba(255,255,255,0.14);
        --stroke: rgba(255,255,255,0.12);
        --text: #e9eef6;
        --muted: #b6c2d0;
        --accent: #7cc3ff;
        --settings-bg: rgba(14, 20, 30, 0.9);
        --settings-panel: rgba(22, 30, 44, 0.88);
        --settings-border: rgba(170, 196, 235, 0.22);
        --settings-highlight: rgba(124, 195, 255, 0.18);
        --settings-glow: rgba(124, 195, 255, 0.45);
        --aws: 210, 94%, 62%;
        --gitlab: 16, 93%, 61%;
        --figma: 280, 79%, 66%;
        --clickup: 250, 87%, 72%;
        --gdocs: 204, 100%, 61%;
        --gsheets: 146, 62%, 52%;
        --gslides: 44, 95%, 62%;
        --gcal: 217, 90%, 60%;
        --radius: 16px;
        --blur: 18px;
        --row-h: 54px; /* 單列高度估值，供 fix-height 使用 */
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        color: var(--text);
        background: radial-gradient(1200px 800px at 10% -10%, #142032 0%, transparent 60%),
                    radial-gradient(1000px 700px at 110% 20%, #1a2440 0%, transparent 60%),
                    radial-gradient(800px 600px at 50% 120%, #0e1626 0%, transparent 60%),
                    var(--bg);
        overflow: hidden;
      }

      /* Subtle animated blobs for liquid feel */
      .bg-blobs {
        position: fixed; inset: 0; pointer-events: none; overflow: hidden;
        filter: blur(40px) saturate(120%);
        opacity: 0.8;
      }
      .blob {
        position: absolute; width: 40vmax; height: 40vmax; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(124,195,255,0.35), rgba(124,195,255,0.05) 60%, transparent 70%);
        animation: float 28s ease-in-out infinite;
        mix-blend-mode: screen;
      }
      .blob.b2 { background: radial-gradient(circle at 60% 40%, rgba(173,124,255,0.30), rgba(173,124,255,0.05) 60%, transparent 70%); animation-duration: 36s; }
      .blob.b3 { background: radial-gradient(circle at 50% 50%, rgba(255,180,124,0.25), rgba(255,180,124,0.05) 60%, transparent 70%); animation-duration: 42s; }
      @keyframes float {
        0% { transform: translate(-10%, -10%) scale(1); }
        25% { transform: translate(10%, -5%) scale(1.08); }
        50% { transform: translate(0%, 10%) scale(0.96); }
        75% { transform: translate(-8%, -2%) scale(1.04); }
        100% { transform: translate(-10%, -10%) scale(1); }
      }

      header {
        position: relative;
        display: flex;
        gap: 16px;
        align-items: center;
        padding: 24px 28px;
        z-index: 2;
        flex-wrap: wrap;
      }

      .title { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
      
      .logo {
        width: 48px; height: 48px; border-radius: 12px;
        background: linear-gradient(135deg, rgba(124,195,255,0.4), rgba(255,255,255,0.06));
        box-shadow: inset 0 0 0 1px var(--stroke), 0 6px 16px rgba(0,0,0,0.25);
        backdrop-filter: blur(var(--blur));
      }
      .logo img { width: 100%; height: 100%; display: block; object-fit: contain; border-radius: 10px; }
      @media (prefers-color-scheme: dark) {
        .logo img { content: url('icon_white.png'); }
      }
      h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; font-weight: 700; }
      .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

      .controls { display: flex; gap: 10px; align-items: center; flex-shrink: 0; margin-left: auto; }
      .search { position: relative; }
      .search input {
        width: 42vw; min-width: 260px; max-width: 300px;
        padding: 12px 38px 12px 14px;
        border-radius: var(--radius);
        background: var(--glass);
        color: var(--text);
        border: 1px solid var(--stroke);
        outline: none;
        backdrop-filter: blur(var(--blur));
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      .search input::placeholder { color: #9db0c3; }
      .search .kbd {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        font-size: 11px; color: #9db0c3; background: rgba(255,255,255,0.06);
        border: 1px solid var(--stroke);
        padding: 2px 6px; border-radius: 6px;
      }
      .btn {
        padding: 10px 12px;
        border-radius: 12px;
        background: var(--glass);
        border: 1px solid var(--stroke);
        color: var(--text);
        cursor: pointer;
        backdrop-filter: blur(var(--blur));
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn:hover { background: var(--glass-strong); }
      .btn svg { width: 18px; height: 18px; }
      .cat-delete, .remove-matcher { border-color:#bd6b6b ;}

      main {
        position: absolute; inset: 90px 0 0 0; overflow: auto; padding: 8px 22px 24px;
      }

      /* Grid layout with controllable column count */
      .grid { display: grid; grid-template-columns: repeat(var(--col, 3), minmax(0, 1fr)); gap: 16px; align-content: start; }
      @media (max-width: 1200px) { .grid { grid-template-columns: repeat(var(--col, 3), minmax(0, 1fr)); } }
      @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 700px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 540px) {
        header { flex-wrap: wrap; }
        .title { width: 100%; }
        .controls { width: 100%; justify-content: space-between; }
        .search input { width: 100%; min-width: 0; }
        main { inset: 110px 0 0 0; }
        .grid { grid-template-columns: 1fr; }
      }

      .card {
        break-inside: avoid;
        background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
        border: 1px solid var(--stroke);
        border-radius: 18px;
        padding: 14px;
        margin: 0 0 16px 0;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 30px rgba(0,0,0,0.18);
        backdrop-filter: blur(calc(var(--blur) * 0.9));
        position: relative;
        overflow: hidden;
        width: 100%;
      }
      .card::after {
        content: "";
        position: absolute; inset: 0;
        background: radial-gradient(200px 120px at 0% -10%, rgba(255,255,255,0.18), transparent 60%);
        pointer-events: none;
      }
      .card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
      .card-title { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: 0.2px; font-size: 18px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; }
      .tag { color: var(--muted); font-size: 12px; }

      /* 新增 list-container 作為 list 的外層容器，用於放置門簾 */
      .list-container {
        position: relative;
        margin-top: 10px;
      }
      
      .list { 
        display: grid; 
        gap: 8px; 
        position: relative; 
      }
      
      /* Privacy curtain */
      .curtain {
        position: absolute; inset: 0; border-radius: 12px;
        background:
          linear-gradient(180deg, rgba(10,14,20,0.60), rgba(10,14,20,0.45)),
          repeating-linear-gradient(45deg, rgba(255,255,255,0.50) 0 8px, rgba(0,0,0,0.70) 8px 16px);
        backdrop-filter: blur(6px) saturate(120%);
        -webkit-backdrop-filter: blur(6px) saturate(120%);
        display: grid; place-items: center; cursor: pointer;
        z-index: 2;
      }
      .curtain:hover { background: linear-gradient(180deg, rgba(10,14,20,0.68), rgba(10,14,20,0.52)), repeating-linear-gradient(45deg, rgba(255,255,255,0.12) 0 8px, rgba(0,0,0,0.12) 8px 16px); }
      .curtain-hint { color: #c9d6e2; font-size: 12px; padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.08); border: 1px solid var(--stroke); }
      .item { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 10px 10px; border-radius: 12px; border: 1px solid transparent; background: rgba(255,255,255,0.04); transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease; }
      .item:hover { background: rgba(255,255,255,0.08); border-color: var(--stroke); }
      .meta { display: flex; gap: 8px; align-items: center; min-width: 0; }
      .favicon { width: 20px; height: 20px; border-radius: 4px; background: rgba(255,255,255,0.2); overflow: hidden; flex: 0 0 auto; }
      .favicon img { width: 100%; height: 100%; display: block; }
      .titleline { display: block; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .urlline { display: block; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top:5px; }
      .actions { display: flex; gap: 6px; align-items: center; }
      .chip { font-size: 11px; color: var(--muted); padding: 3px 6px; border: 1px solid var(--stroke); border-radius: 8px; background: rgba(0,0,0,0.1); }
      .pin { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 8px; border: 1px solid var(--stroke); background: rgba(255,255,255,0.05); cursor: pointer; color: #a8b6c7; }
      .pin.active { color: var(--accent); border-color: rgba(124,195,255,0.7); background: rgba(124,195,255,0.08); border: 1.5px solid; }

      .footer { text-align: center; color: var(--muted); font-size: 12px; padding: 18px 0 28px; }
      .footer a { color: var(--accent); text-decoration: none; margin-left: 6px; }
      .footer a:hover { text-decoration: underline; }


      /* Category color accents */
      .aws .dot { background: hsl(var(--aws)); }
      .gitlab .dot { background: hsl(var(--gitlab)); }
      .figma .dot { background: hsl(var(--figma)); }
      .clickup .dot { background: hsl(var(--clickup)); }
      .gdocs .dot { background: hsl(var(--gdocs)); }
      .gsheets .dot { background: hsl(var(--gsheets)); }
      .gslides .dot { background: hsl(var(--gslides)); }
      .gcal .dot { background: hsl(var(--gcal)); }

      /* Scrollbar */
      main::-webkit-scrollbar { height: 10px; width: 10px; }
      main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; border: 2px solid rgba(0,0,0,0); background-clip: padding-box; }
      main::-webkit-scrollbar-track { background: transparent; }

      /* Dialogs */
      #focusDialog::backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); }

      #settingsDialog::backdrop {
        background: linear-gradient(120deg, rgba(8,12,18,0.8), rgba(6,10,16,0.65));
        backdrop-filter: blur(10px) saturate(130%);
      }

      .settings-panel {
        position: relative;
        min-width: 1080px;
        max-width: 1120px;
        max-height: 80vh;
        border-radius: 20px;
        padding: 18px;
        background: radial-gradient(140% 120% at 10% 0%, rgba(124,195,255,0.18), transparent 55%),
                    radial-gradient(120% 120% at 100% 10%, rgba(255,196,124,0.16), transparent 55%),
                    var(--settings-panel);
        border: 1px solid var(--settings-border);
        box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04) inset;
        color: var(--text);
        backdrop-filter: blur(14px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .settings-panel::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 20px;
        background: linear-gradient(145deg, rgba(255,255,255,0.08), transparent 40%, rgba(124,195,255,0.12));
        pointer-events: none;
        mix-blend-mode: screen;
      }

      .settings-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .settings-title {
        font-family: "Bricolage Grotesque", Inter, system-ui, sans-serif;
        font-size: 20px;
        letter-spacing: 0.4px;
        margin: 0;
      }

      .settings-body {
        display: grid;
        grid-template-columns: 0.4fr 0.6fr;
        gap: 16px;
        flex: 1;
        min-height: 0;
      }

      .settings-section {
        border-radius: 16px;
        padding: 16px;
        background: rgba(10,14,22,0.35);
        border: 1px solid rgba(255,255,255,0.08);
      }

      .settings-section-title {
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        margin: 0 0 10px 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .settings-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        padding: 12px 6px;
        border-bottom: 1px dashed rgba(255,255,255,0.06);
      }

      .settings-row:last-of-type { border-bottom: none; }

      .settings-label {
        font-size: 14px;
        color: var(--text);
      }

      .settings-input,
      .settings-select {
        width: 140px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.05);
        color: var(--text);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .settings-input:focus,
      .settings-select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124,195,255,0.18);
      }

      .settings-switch {
        appearance: none;
        width: 44px;
        height: 24px;
        border-radius: 999px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.2);
        position: relative;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .settings-switch::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #f2f6ff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.35);
        transition: transform 0.2s ease;
      }

      .settings-switch:checked {
        background: linear-gradient(120deg, rgba(124,195,255,0.9), rgba(124,195,255,0.5));
        border-color: rgba(124,195,255,0.8);
        box-shadow: 0 0 0 3px rgba(124,195,255,0.15);
      }

      .settings-switch:checked::after {
        transform: translateX(20px);
      }

      .settings-categories .cat-toggle {
        transform: scale(0.92);
        transform-origin: left center;
      }

      .settings-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 12px;
      }

      .settings-actions .btn {
        width: 110px;
        border-radius: 12px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.16);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .settings-actions .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      }

      .settings-details {
        border-radius: 16px;
        padding: 16px;
        background: rgba(10,14,22,0.25);
        border: 1px dashed rgba(255,255,255,0.08);
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 0;
      }

      .settings-summary {
        color: var(--muted);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .settings-categories {
        display: grid;
        gap: 14px;
        overflow: auto;
        min-height: 0;
        padding: 6px 8px 8px 4px;
      }

      .settings-categories::-webkit-scrollbar {
        width: 6px;
      }

      .settings-categories::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.18);
        border-radius: 999px;
      }

      .settings-categories::-webkit-scrollbar-track {
        background: transparent;
      }

      .settings-categories .cat {
        padding: 12px;
        border-radius: 14px;
        background:
          linear-gradient(140deg, rgba(124,195,255,0.08), rgba(255,255,255,0.03) 55%, rgba(255,196,124,0.06)),
          rgba(8,12,18,0.35);
        border: 1px solid rgba(124,195,255,0.18);
        box-shadow: 0 10px 26px rgba(0,0,0,0.28), inset 0 0 0 1px rgba(255,255,255,0.03);
        backdrop-filter: blur(10px);
        display: grid;
        gap: 10px;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      }

      .settings-categories .cat:hover {
        transform: translateY(-1px);
        border-color: rgba(124,195,255,0.35);
        box-shadow: 0 16px 34px rgba(0,0,0,0.35), 0 0 24px rgba(124,195,255,0.12);
      }

      .settings-categories .cat:focus-within {
        border-color: rgba(124,195,255,0.6);
        box-shadow: inset 0 0 0 2px rgba(124,195,255,0.4), 0 18px 38px rgba(0,0,0,0.4);
      }

      .settings-categories .cat:nth-child(odd) {
        background:
          linear-gradient(140deg, rgba(124,195,255,0.12), rgba(255,255,255,0.03) 55%, rgba(124,195,255,0.04)),
          rgba(8,12,18,0.35);
        border-color: rgba(124,195,255,0.22);
      }

      .settings-categories .cat:nth-child(even) {
        background:
          linear-gradient(140deg, rgba(255,196,124,0.12), rgba(255,255,255,0.03) 55%, rgba(124,195,255,0.04)),
          rgba(8,12,18,0.35);
        border-color: rgba(255,196,124,0.22);
      }

      .settings-categories .cat-header {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        padding: 10px 10px;
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
      }

      .settings-categories .cat-actions {
        display: flex;
        gap: 6px;
        margin-left: auto;
      }

      .settings-categories .cat-actions .btn {
        background: rgba(124,195,255,0.14);
        border-color: rgba(124,195,255,0.3);
        border-radius: 999px;
      }

      .settings-categories .cat-fields {
        display: grid;
        grid-template-columns: 1fr 1fr 1.4fr;
        gap: 10px;
      }

      .settings-categories .cat-fields input {
        width: 100%;
      }

      .settings-categories .matchers {
        display: grid;
        gap: 8px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(0,0,0,0.12);
        border: 1px dashed rgba(255,255,255,0.06);
      }

      .settings-categories .matcher {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 6px 8px;
        border-radius: 10px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.05);
        font-size: 12px;
      }

      .settings-categories .matcher-actions {
        display: flex;
        justify-content: flex-start;
      }

      .settings-categories .matcher-actions .btn {
        background: rgba(124,195,255,0.12);
        border-color: rgba(124,195,255,0.28);
      }

      .settings-categories .cat input[type="text"],
      .settings-categories .cat input[type="url"],
      .settings-categories .cat input[type="number"],
      .settings-categories .cat select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid var(--stroke);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        font-size: 12px;
      }

      
      #focusDialog { border: 1px solid var(--stroke); border-radius: 0; padding: 0; background: rgba(20,28,40,0.92); color: var(--text); width: 80vw; height: 100vh;  }
      .focus-wrap { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
      .focus-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--stroke); }
      .focus-title { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; }
      .focus-body { padding: 12px 50px 16px; overflow: auto; }
      .focus-body .item .titleline { white-space: normal; }
    </style>
  </head>
  <body>
    <div class="bg-blobs">
      <div class="blob b1" style="left:-10vmax; top:-10vmax;"></div>
      <div class="blob b2" style="right:-12vmax; top:0;"></div>
      <div class="blob b3" style="left:10vmax; bottom:-12vmax;"></div>
    </div>

    <header>
      <div class="title">
        <div class="logo"><img src="icon_white.png" alt="NeonFlux logo"></div>
        <div>
          <h1>NeonFlux <span class="sub" style="margin-left:3px">霓虹流</span></h1> 
          <div class="sub">自定義歷史紀錄分類</div>
        </div>
      </div>
      <div class="controls">
        <div class="search">
          <input id="search" type="search" placeholder="搜尋標題或網址" autocomplete="off" />
          <div class="kbd">/</div>
        </div>

        <button class="btn" id="refreshBtn" title="同步瀏覽記錄"></button>
        <button class="btn" id="curtainBtn" title="隱私門簾（投影用）"></button>
        <button class="btn" id="settingsBtn" title="設定"></button>
      </div>
    </header>

    <main>
      <div id="grid" class="grid"></div>
      <div class="footer">
        <span id="footerText">瀏覽記錄自動分類 · 本機儲存 · 隱私優先</span>
        <a id="rateLink" href="https://chromewebstore.google.com/detail/neonflux/npmcfbnpmpiphenjnmlcgacbmdgcpacb" target="_blank" rel="noreferrer">給 5 星好評</a>
      </div>
    </main>

    <!-- Settings modal -->
    <dialog id="settingsDialog">
      <form method="dialog" class="settings-panel">
        <div class="settings-head">
          <h3 id="settingsTitle" class="settings-title">設定</h3>
        </div>
        <div class="settings-body">
          <div class="settings-section">
            <div id="settingsGeneralLegend" class="settings-section-title">一般</div>
            <label class="settings-row">
              <span id="settingsCategoryLimitLabel" class="settings-label">分類顯示數量（上限）</span>
              <input id="limitInput" type="number" min="1" max="100" step="1" class="settings-input" />
            </label>
            <label class="settings-row">
              <span id="settingsRecentDaysLabel" class="settings-label">僅顯示近 N 天</span>
              <input id="daysInput" type="number" min="1" max="365" step="1" class="settings-input" />
            </label>
            <label class="settings-row">
              <span id="settingsSortModeLabel" class="settings-label">排序模式</span>
              <select id="sortSelect" class="settings-select">
                <option value="latest" id="sortLatestOption">最新在前</option>
                <option value="smart" id="sortSmartOption">智慧排序</option>
              </select>
            </label>
            <label class="settings-row">
              <span id="settingsColCountLabel" class="settings-label">每列分類數（欄位數）</span>
              <select id="colCountSelect" class="settings-select">
                <option value="1" id="colCount1Option">1 欄</option>
                <option value="2" id="colCount2Option">2 欄</option>
                <option value="3" id="colCount3Option">3 欄</option>
                <option value="4" id="colCount4Option">4 欄</option>
              </select>
            </label>
            <label class="settings-row">
              <span id="langLabel" class="settings-label">語言</span>
              <select id="langSelect" class="settings-select">
                <option value="zh">中文</option>
                <option value="en">English</option>
              </select>
            </label>
            <label class="settings-row">
              <span id="settingsNormalizeGroupLabel" class="settings-label">合併相同路徑（忽略參數）</span>
              <input id="normalizeGroupToggle" type="checkbox" class="settings-switch" />
            </label>

            <div class="settings-actions">
              <button class="btn" value="cancel" id="settingsCancelBtn">取消</button>
              <button class="btn" value="confirm" id="settingsSaveBtn">儲存</button>
            </div>
          </div>

          <div class="settings-section settings-details">
            <div id="settingsCategoryManagementSummary" class="settings-section-title">分類管理（進階）</div>
            <div class="settings-categories">
              <div id="categoriesUI" style="display:grid; gap:10px;"></div>
              <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:4px;">
                <button class="btn" id="addCategoryBtn" type="button">新增分類</button>
                <button class="btn" id="resetCategoriesUIButton" type="button">重置為預設</button>
                <button class="btn" id="saveCategoriesUIButton" type="button">儲存分類</button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </dialog>

    <!-- Focus dialog (group full view) -->
    <dialog id="focusDialog">
      <div class="focus-wrap">
        <div class="focus-header">
          <div class="focus-title">
            <span class="dot" id="focusDot" style="width:12px;height:12px;border-radius:50%;"></span>
            <span id="focusTitle"></span>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <button class="btn" id="focusCloseBtn">返回</button>
          </div>
        </div>
        <div class="focus-body">
          <div id="focusList" class="list"></div>
        </div>
      </div>
    </dialog>


    <script src="./main.js" defer></script>
  </body>
  </html>
