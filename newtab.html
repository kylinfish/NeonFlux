<!doctype html>
  <html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My Workflow Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root{
        --bg: #0b0f14;
        --glass: rgba(255,255,255,0.08);
        --glass-strong: rgba(255,255,255,0.14);
        --stroke: rgba(255,255,255,0.12);
        --text: #e9eef6;
        --muted: #b6c2d0;
        --accent: #7cc3ff;
        --aws: 210, 94%, 62%;
        --gitlab: 16, 93%, 61%;
        --figma: 280, 79%, 66%;
        --clickup: 250, 87%, 72%;
        --gdocs: 204, 100%, 61%;
        --gsheets: 146, 62%, 52%;
        --gslides: 44, 95%, 62%;
        --gcal: 217, 90%, 60%;
        --radius: 16px;
        --blur: 18px;
        --row-h: 54px; /* 單列高度估值，供 fix-height 使用 */
      }
      * { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        color: var(--text);
        background: radial-gradient(1200px 800px at 10% -10%, #142032 0%, transparent 60%),
                    radial-gradient(1000px 700px at 110% 20%, #1a2440 0%, transparent 60%),
                    radial-gradient(800px 600px at 50% 120%, #0e1626 0%, transparent 60%),
                    var(--bg);
        overflow: hidden;
      }

      /* Subtle animated blobs for liquid feel */
      .bg-blobs {
        position: fixed; inset: 0; pointer-events: none; overflow: hidden;
        filter: blur(40px) saturate(120%);
        opacity: 0.8;
      }
      .blob {
        position: absolute; width: 40vmax; height: 40vmax; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(124,195,255,0.35), rgba(124,195,255,0.05) 60%, transparent 70%);
        animation: float 28s ease-in-out infinite;
        mix-blend-mode: screen;
      }
      .blob.b2 { background: radial-gradient(circle at 60% 40%, rgba(173,124,255,0.30), rgba(173,124,255,0.05) 60%, transparent 70%); animation-duration: 36s; }
      .blob.b3 { background: radial-gradient(circle at 50% 50%, rgba(255,180,124,0.25), rgba(255,180,124,0.05) 60%, transparent 70%); animation-duration: 42s; }
      @keyframes float {
        0% { transform: translate(-10%, -10%) scale(1); }
        25% { transform: translate(10%, -5%) scale(1.08); }
        50% { transform: translate(0%, 10%) scale(0.96); }
        75% { transform: translate(-8%, -2%) scale(1.04); }
        100% { transform: translate(-10%, -10%) scale(1); }
      }

      header {
        position: relative;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 24px 28px;
        z-index: 2;
      }

      .title { display: flex; align-items: center; gap: 14px; }
      .logo {
        width: 36px; height: 36px; border-radius: 12px;
        background: linear-gradient(135deg, rgba(124,195,255,0.4), rgba(255,255,255,0.06));
        box-shadow: inset 0 0 0 1px var(--stroke), 0 6px 16px rgba(0,0,0,0.25);
        backdrop-filter: blur(var(--blur));
      }
      h1 { font-size: 18px; margin: 0; letter-spacing: 0.2px; font-weight: 700; }
      .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

      .controls { display: flex; gap: 10px; align-items: center; }
      .search { position: relative; }
      .search input {
        width: 42vw; min-width: 260px; max-width: 680px;
        padding: 12px 38px 12px 14px;
        border-radius: var(--radius);
        background: var(--glass);
        color: var(--text);
        border: 1px solid var(--stroke);
        outline: none;
        backdrop-filter: blur(var(--blur));
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      .search input::placeholder { color: #9db0c3; }
      .search .kbd {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        font-size: 11px; color: #9db0c3; background: rgba(255,255,255,0.06);
        border: 1px solid var(--stroke);
        padding: 2px 6px; border-radius: 6px;
      }
      .btn {
        padding: 10px 12px;
        border-radius: 12px;
        background: var(--glass);
        border: 1px solid var(--stroke);
        color: var(--text);
        cursor: pointer;
        backdrop-filter: blur(var(--blur));
      }
      .btn:hover { background: var(--glass-strong); }

      main {
        position: absolute; inset: 90px 0 0 0; overflow: auto; padding: 8px 22px 24px;
      }

      /* Fluid masonry-like grid using CSS columns */
      .grid { column-width: 320px; column-gap: 16px; }
      @media (max-width: 1200px) { .grid { column-width: 300px; } }
      @media (max-width: 900px) { .grid { column-width: 280px; } }
      @media (max-width: 700px) { .grid { column-width: 260px; } }
      @media (max-width: 540px) {
        header { grid-template-columns: 1fr; }
        .controls { justify-content: space-between; }
        .search input { width: 100%; min-width: 0; }
        main { inset: 110px 0 0 0; }
      }

      .card {
        break-inside: avoid;
        background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
        border: 1px solid var(--stroke);
        border-radius: 18px;
        padding: 14px;
        margin: 0 0 16px 0;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 30px rgba(0,0,0,0.18);
        backdrop-filter: blur(calc(var(--blur) * 0.9));
        position: relative;
        overflow: hidden;
      }
      .card::after {
        content: "";
        position: absolute; inset: 0;
        background: radial-gradient(200px 120px at 0% -10%, rgba(255,255,255,0.18), transparent 60%);
        pointer-events: none;
      }
      .card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
      .card-title { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: 0.2px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; }
      .tag { color: var(--muted); font-size: 12px; }

      .list { display: grid; gap: 8px; margin-top: 10px; }
      .item { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 10px 10px; border-radius: 12px; border: 1px solid transparent; background: rgba(255,255,255,0.04); transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease; }
      .item:hover { background: rgba(255,255,255,0.08); border-color: var(--stroke); }
      .meta { display: flex; gap: 8px; align-items: center; min-width: 0; }
      .favicon { width: 16px; height: 16px; border-radius: 4px; background: rgba(255,255,255,0.2); overflow: hidden; flex: 0 0 auto; }
      .favicon img { width: 100%; height: 100%; display: block; }
      .titleline { display: block; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .urlline { display: block; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .actions { display: flex; gap: 6px; align-items: center; }
      .chip { font-size: 11px; color: var(--muted); padding: 3px 6px; border: 1px solid var(--stroke); border-radius: 8px; background: rgba(0,0,0,0.1); }
      .pin { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 8px; border: 1px solid var(--stroke); background: rgba(255,255,255,0.05); cursor: pointer; color: #a8b6c7; }
      .pin.active { color: var(--accent); border-color: rgba(124,195,255,0.7); background: rgba(124,195,255,0.08); }

      .footer { text-align: center; color: var(--muted); font-size: 12px; padding: 18px 0 28px; }

      /* Category color accents */
      .aws .dot { background: hsl(var(--aws)); }
      .gitlab .dot { background: hsl(var(--gitlab)); }
      .figma .dot { background: hsl(var(--figma)); }
      .clickup .dot { background: hsl(var(--clickup)); }
      .gdocs .dot { background: hsl(var(--gdocs)); }
      .gsheets .dot { background: hsl(var(--gsheets)); }
      .gslides .dot { background: hsl(var(--gslides)); }
      .gcal .dot { background: hsl(var(--gcal)); }

      /* Scrollbar */
      main::-webkit-scrollbar { height: 10px; width: 10px; }
      main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; border: 2px solid rgba(0,0,0,0); background-clip: padding-box; }
      main::-webkit-scrollbar-track { background: transparent; }

      /* Focus dialog */
      #focusDialog::backdrop { background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); }
      #focusDialog { border: 1px solid var(--stroke); border-radius: 0; padding: 0; background: rgba(20,28,40,0.92); color: var(--text); width: 100vw; height: 100vh; max-height: none; }
      .focus-wrap { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
      .focus-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--stroke); }
      .focus-title { display: flex; align-items: center; gap: 10px; font-weight: 700; }
      .focus-body { padding: 12px 16px 16px; overflow: auto; }
      .focus-body .item .titleline { white-space: normal; }
    </style>
  </head>
  <body>
    <div class="bg-blobs">
      <div class="blob b1" style="left:-10vmax; top:-10vmax;"></div>
      <div class="blob b2" style="right:-12vmax; top:0;"></div>
      <div class="blob b3" style="left:10vmax; bottom:-12vmax;"></div>
    </div>

    <header>
      <div class="title">
        <div class="logo"></div>
        <div>
          <h1>My Workflow Start</h1>
          <div class="sub">常用工作分類 • Liquid Glass • New Tab</div>
        </div>
      </div>
      <div class="controls">
        <div class="search">
          <input id="search" type="search" placeholder="搜尋標題或網址 ( / 觸發 )" autocomplete="off" />
          <div class="kbd">/</div>
        </div>

        <button class="btn" id="refreshBtn">同步瀏覽記錄</button>
        <button class="btn" id="settingsBtn">設定</button>
      </div>
    </header>

    <main>
      <div id="grid" class="grid"></div>
      <div class="footer">由瀏覽記錄自動分類 · 本機儲存 · gpt-5</div>
    </main>

    <!-- Settings modal -->
    <dialog id="settingsDialog">
      <form method="dialog" style="min-width: 340px; max-width: 720px; background: rgba(20,28,40,0.8); color: var(--text); border:1px solid var(--stroke); border-radius: 16px; padding: 16px; backdrop-filter: blur(14px);">
        <h3 style="margin:0 0 10px 0;">設定</h3>
        <div style="display:grid; gap:12px;">
          <fieldset style="border:1px solid var(--stroke); border-radius:12px; padding:10px;">
            <legend style="color:var(--muted);">一般</legend>
            <label style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
              <span>每個分類顯示數量（上限）</span>
              <input id="limitInput" type="number" min="5" max="200" step="1" style="width:100px; padding:6px 8px; border-radius:8px; border:1px solid var(--stroke); background: rgba(255,255,255,0.06); color:var(--text);" />
            </label>
            <label style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
              <span>僅顯示近 N 天</span>
              <input id="daysInput" type="number" min="1" max="365" step="1" style="width:100px; padding:6px 8px; border-radius:8px; border:1px solid var(--stroke); background: rgba(255,255,255,0.06); color:var(--text);" />
            </label>
            <label style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
              <span>排序模式</span>
              <select id="sortSelect" style="width:140px; padding:6px 8px; border-radius:8px; border:1px solid var(--stroke); background: rgba(255,255,255,0.06); color:var(--text);">
                <option value="latest">最新在前</option>
                <option value="smart">智慧排序</option>
              </select>
            </label>
            <label style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
              <span>每列分類數（欄位數）</span>
              <select id="colCountSelect" style="width:140px; padding:6px 8px; border-radius:8px; border:1px solid var(--stroke); background: rgba(255,255,255,0.06); color:var(--text);">
                <option value="2">2 欄</option>
                <option value="3">3 欄</option>
                <option value="4">4 欄</option>
              </select>
            </label>
          </fieldset>

          <details>
            <summary style="cursor:pointer; color:var(--muted);">分類管理（進階）</summary>
            <div style="display:grid; gap:8px; margin-top:8px;">


             <div id="categoriesUI" style="display:grid; gap:10px;"></div>
            <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
              <button class="btn" id="addCategoryBtn" type="button">新增分類</button>
              <button class="btn" id="resetCategoriesUIButton" type="button">重置為預設</button>
              <button class="btn" id="saveCategoriesUIButton" type="button">儲存分類</button>
            </div>


            </div>
          </details>
        </div>
        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
          <button class="btn" value="cancel">取消</button>
          <button class="btn" value="confirm">儲存</button>
        </div>
      </form>
    </dialog>

    <!-- Focus dialog (group full view) -->
    <dialog id="focusDialog">
      <div class="focus-wrap">
        <div class="focus-header">
          <div class="focus-title">
            <span class="dot" id="focusDot" style="width:12px;height:12px;border-radius:50%;"></span>
            <span id="focusTitle"></span>
          </div>
          <div style="display:flex; gap:8px; align-items:center;">
            <button class="btn" id="focusCloseBtn">返回</button>
          </div>
        </div>
        <div class="focus-body">
          <div id="focusList" class="list"></div>
        </div>
      </div>
    </dialog>

    <script src="./main.js" defer></script>
  </body>
  </html>
